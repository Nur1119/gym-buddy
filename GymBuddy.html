    boost: '#FFEB3B',

const ThemeCtx = React.createContext(null);

function ThemeProvider({ mode, accent, children }) {
  const t = THEMES[mode];
  const a = ACCENT_PALETTES[accent] || ACCENT_PALETTES.aurora;
  const value = React.useMemo(() => ({ ...t, ...a, mode, accentName: accent }), [mode, accent]);
  return <ThemeCtx.Provider value={value}>{children}</ThemeCtx.Provider>;
}

function useTheme() {
  return React.useContext(ThemeCtx);
}

window.ThemeProvider = ThemeProvider;
window.useTheme = useTheme;
window.THEMES = THEMES;
window.ACCENT_PALETTES = ACCENT_PALETTES;

// ── Avatar with gradient initial fallback
function Avatar({ name, size = 40, color = '#7C5CFF', color2 = '#00C2FF', ring = false, ringColor }) {
  const initial = (name || '?').charAt(0).toUpperCase();
  return (
    <div style={{
      width: size, height: size, borderRadius: size / 2,
      background: `linear-gradient(135deg, ${color}, ${color2})`,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      color: '#fff', fontWeight: 700, fontSize: size * 0.42,
      flexShrink: 0, position: 'relative',
      boxShadow: ring ? `0 0 0 2px ${ringColor || '#fff'}, 0 0 0 4px ${color}` : undefined,
    }}>{initial}</div>
  );
}

// ── Photo placeholder (subtly striped, monospace label)
function PhotoSlot({ color = '#7C5CFF', color2 = '#00C2FF', label, style }) {
  return (
    <div style={{
      background: `linear-gradient(135deg, ${color} 0%, ${color2} 100%)`,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'flex-end', justifyContent: 'flex-start',
      ...style,
    }}>
      {/* Stripe pattern */}
      <div style={{
        position: 'absolute', inset: 0,
        background: 'repeating-linear-gradient(45deg, transparent 0 14px, rgba(255,255,255,0.06) 14px 28px)',
      }} />
      {/* Soft vignette */}
      <div style={{
        position: 'absolute', inset: 0,
        background: 'radial-gradient(60% 60% at 50% 30%, rgba(255,255,255,0.18), transparent 70%)',
      }} />
      {label && (
        <div style={{
          position: 'relative', padding: '6px 10px', margin: 10,
          background: 'rgba(0,0,0,0.35)', borderRadius: 6,
          color: 'rgba(255,255,255,0.85)', fontSize: 10, fontFamily: 'ui-monospace, "SF Mono", monospace',
          letterSpacing: 0.3,
        }}>{label}</div>
      )}
    </div>
  );
}

// ── Card surface
function Card({ children, style, padding = 16, onClick, theme }) {
  const t = theme || useTheme();
  return (
    <div onClick={onClick} style={{
      background: t.surface,
      border: `1px solid ${t.border}`,
      borderRadius: 18,
      padding,
      cursor: onClick ? 'pointer' : 'default',
      transition: 'transform .12s ease',
      ...style,
    }}>{children}</div>
  );
}

// ── Pill button
function Pill({ children, active, color, onClick, style }) {

// ── Bottom navigation
function BottomNav({ tab, onTab, theme, mode = 'ios' }) {
  const t = theme || useTheme();
  const { t: tr } = useI18n();
  const tabs = [
    { key: 'home', label: tr('home'), icon: 'home' },
    { key: 'workout', label: tr('workout'), icon: 'dumbbell' },
    { key: 'discover', label: tr('discover'), icon: 'heart' },
    { key: 'friends', label: tr('friends'), icon: 'users' },
    { key: 'profile', label: tr('profile'), icon: 'user' },
  ];
  return (
    <div style={{
      display: 'flex', justifyContent: 'space-around', alignItems: 'flex-end',
      background: t.surface,
      borderTop: `1px solid ${t.border}`,
      paddingTop: 8, paddingBottom: mode === 'ios' ? 26 : 14,
      paddingLeft: 6, paddingRight: 6,
      flexShrink: 0,
    }}>
      {tabs.map(x => {
        const active = tab === x.key;
        return (
          <button key={x.key} onClick={() => onTab(x.key)} style={{
            border: 'none', background: 'transparent', cursor: 'pointer',
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
            padding: '4px 6px', minWidth: 56, fontFamily: 'inherit',
          }}>
            <div style={{
              width: 44, height: 28, borderRadius: 14,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              background: active ? t.gradSoft : 'transparent',
              color: active ? t.p2 : t.textDim, transition: 'all .2s',
              position: 'relative',
            }}>
              {x.key === 'discover' && active
                ? <Icon name="heart-fill" size={22} color={t.p2}/>
                : <Icon name={x.icon} size={22}/>}
            </div>
            <div style={{
              fontSize: 10, fontWeight: 600,
              color: active ? t.p2 : t.textDim,
            }}>{x.label}</div>
          </button>
        );
      })}
    </div>
  );
}

// ── Progress bar
function ProgressBar({ value, max = 100, color, height = 8, style }) {
  const t = useTheme();
  const pct = Math.max(0, Math.min(100, (value / max) * 100));
  return (
    <div style={{
      width: '100%', height, background: t.chip, borderRadius: height / 2,
      overflow: 'hidden', ...style,
    }}>

        background: color || t.grad, borderRadius: height / 2,
        transition: 'width .3s ease',
      }}/>
    </div>
  );
}

// ── Switch
function Switch({ value, onChange, color }) {
  const t = useTheme();
  return (
    <button onClick={() => onChange(!value)} style={{
      width: 48, height: 28, borderRadius: 14, padding: 2,
      background: value ? (color || t.p2) : t.chip,

        boxShadow: '0 2px 4px rgba(0,0,0,0.2)', transition: 'transform .2s',
      }}/>
    </button>
  );
}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {

    <>

function TweakRow({ label, value, children, inline = false }) {

    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

function IOSGlassPill({ children, dark = false, style = {} }) {

    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'

      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',

      }} />
      {/* shine */}
      <div style={{

        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',

              color: sugg, letterSpacing: -0.43, lineHeight: '22px',

function AndroidKeyboard() {
  let _k = 0;
  const key = (l, { flex = 1, bg = MD_C.surface, r = 6, minW, fs = 21 } = {}) => (
    <div key={_k++} style={{
      height: 46, borderRadius: r, flex, minWidth: minW,

      fontFamily: 'Roboto, system-ui', fontSize: fs,

  const row = (keys, style = {}) => (
    <div style={{ display: 'flex', gap: 6, justifyContent: 'center', ...style }}>
      {keys.map(l => key(l))}
    </div>
  );
  return (
    <div style={{

        <div style={{ display: 'flex', gap: 6 }}>

          {key(',', { bg: MD_C.surfaceVariant })}
          {key('', { flex: 3, minW: 154 })}
          {key('.', { bg: MD_C.surfaceVariant })}
          {key('', { bg: MD_C.primaryFixedDim, r: 100, minW: 58 })}

  );
}

function StreakDay({ day, value, theme }) {
  const t = theme;
  const filled = value === 1;
  const partial = value > 0 && value < 1;
  const bg = filled ? t.grad : partial ? t.gradSoft : t.chip;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, flex: 1 }}>
      <div style={{ fontSize: 10, fontWeight: 700, color: filled ? t.p2 : t.textDim, letterSpacing: 0.5 }}>{day}</div>
      <div style={{
        width: 32, height: 32, borderRadius: 16, background: bg,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        color: filled ? '#fff' : t.textDim,
        border: !filled && !partial ? `1px solid ${t.border}` : 'none',
      }}>
        {filled && <Icon name="check" size={16} color="#fff"/>}
        {partial && <div style={{width:8,height:8,borderRadius:4,background:t.p2}}/>}
      </div>
    </div>
  );
}

function MuscleHeatmap({ theme }) {
  const t = theme;
  // Show body silhouette with muscle activity
  const muscles = [
    { name: 'chest', cx: 50, cy: 26, level: 0.7 },
    { name: 'shoulder-l', cx: 36, cy: 22, level: 0.5 },
    { name: 'shoulder-r', cx: 64, cy: 22, level: 0.5 },
    { name: 'arm-l', cx: 30, cy: 38, level: 0.6 },
    { name: 'arm-r', cx: 70, cy: 38, level: 0.6 },
    { name: 'core', cx: 50, cy: 44, level: 0.3 },
    { name: 'quad-l', cx: 44, cy: 68, level: 0.8 },
    { name: 'quad-r', cx: 56, cy: 68, level: 0.8 },
    { name: 'calf-l', cx: 44, cy: 88, level: 0.2 },
    { name: 'calf-r', cx: 56, cy: 88, level: 0.2 },
  ];
  const colorAt = (lvl) => {
    if (lvl > 0.6) return t.danger;
    if (lvl > 0.3) return t.warn;
    if (lvl > 0) return t.p1;
    return t.border;
  };
  return (
    <svg viewBox="0 0 100 100" style={{ width: '100%', maxWidth: 140, height: 'auto' }}>
      {/* Body silhouette */}
      <ellipse cx="50" cy="14" rx="8" ry="9" fill={t.surface2} stroke={t.border}/>
      <path d="M30 20 L70 20 L72 50 L66 80 L60 95 L55 95 L52 60 L48 60 L45 95 L40 95 L34 80 L28 50 Z"
            fill={t.surface2} stroke={t.border}/>
      {muscles.map(m => (
        <circle key={m.name} cx={m.cx} cy={m.cy} r={5} fill={colorAt(m.level)} opacity={0.85}/>
      ))}
    </svg>
  );
}

  React.useEffect(() => {

      {/* Rest banner */}

// ── Main Discover screen (swipe cards)
function DiscoverScreen({ theme, onNav }) {
  const t = theme;
  const { t: tr, lang } = useI18n();
  const [stack, setStack] = React.useState(DISCOVER_USERS);
  const [offset, setOffset] = React.useState(0);
  const [matchedUser, setMatchedUser] = React.useState(null);
  const startX = React.useRef(0);
  const dragging = React.useRef(false);

  const handlePointerDown = (e) => {
    dragging.current = true;
    startX.current = e.clientX;
  };
  const handlePointerMove = (e) => {
    if (!dragging.current) return;
    setOffset(e.clientX - startX.current);
  };
  const handlePointerUp = () => {
    if (!dragging.current) return;
    dragging.current = false;
    if (Math.abs(offset) > 80) {
      const direction = offset > 0 ? 'right' : 'left';
      doSwipe(direction);
    } else {
      setOffset(0);
    }
  };

  const doSwipe = (dir) => {
    const top = stack[0];
    // Animate out
    setOffset(dir === 'right' ? 500 : -500);
    setTimeout(() => {
      setStack(prev => prev.slice(1));
      setOffset(0);
      // Random match on right swipe
      if (dir === 'right' && Math.random() > 0.4) {
        setMatchedUser(top);
      }
    }, 250);
  };

  const rotation = offset / 20;

  return (
    <div style={{
      background: t.bg, minHeight: '100%', display: 'flex', flexDirection: 'column',
    }}>
      {/* Header */}
      <div style={{ padding: '4px 18px 8px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <IconBtn name="sliders" onClick={() => onNav('discoverFilters')}/>
        <div style={{
          fontSize: 22, fontWeight: 800,
          background: t.grad, WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
          letterSpacing: -0.5,
        }}>GymBuddy</div>
        <IconBtn name="bell" badge={3} onClick={() => onNav('matches')}/>
      </div>

      {/* Card stack */}
      <div style={{ flex: 1, position: 'relative', padding: '4px 16px 0', minHeight: 0 }}>
        <div
          style={{ position: 'relative', width: '100%', height: '100%', minHeight: 380 }}
          onPointerDown={handlePointerDown}
          onPointerMove={handlePointerMove}
          onPointerUp={handlePointerUp}
          onPointerLeave={handlePointerUp}
        >
          {stack.length === 0 ? (
            <div style={{
              position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
              alignItems: 'center', justifyContent: 'center', gap: 10, padding: 20,
            }}>
              <Icon name="heart" size={48} color={t.textDim}/>
              <div style={{ color: t.textMuted, textAlign: 'center', fontSize: 14, fontWeight: 600 }}>
                {lang === 'ru' ? 'Все пересмотрели! Загляни позже.' : "You're all caught up! Check back later."}
              </div>
            </div>
          ) : (
            <>
              {stack.slice(0, 3).reverse().map((u, idx) => {
                const isTop = idx === stack.slice(0, 3).length - 1;
                const stackDepth = stack.slice(0, 3).length - 1 - idx;
                return (
                  <div key={u.id} style={{
                    position: 'absolute', inset: 0,
                    transform: !isTop ? `scale(${1 - stackDepth * 0.04}) translateY(${stackDepth * 6}px)` : 'none',
                    opacity: !isTop ? 0.6 : 1,
                  }}>
                    <SwipeCard user={u} offset={isTop ? offset : 0} rotation={isTop ? rotation : 0} theme={t} language={lang} top={isTop}/>
                  </div>
                );
              })}
            </>
          )}
        </div>
      </div>

      {/* Action buttons */}
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 14,
        padding: '14px 18px 14px',
      }}>
        <ActionBtn icon="rewind" color={t.warn} size={44}/>
        <ActionBtn icon="close" color={t.nope} size={56} onClick={() => doSwipe('left')}/>
        <ActionBtn icon="star" color={t.superLike} size={48} glow/>
        <ActionBtn icon="heart-fill" color={t.like} size={56} onClick={() => doSwipe('right')}/>
        <ActionBtn icon="bolt" color={t.boost} size={44} glow/>
      </div>

      {/* Match modal */}
      {matchedUser && <MatchModal user={matchedUser} theme={t} onClose={() => setMatchedUser(null)} onChat={() => { setMatchedUser(null); onNav('chat', matchedUser); }}/>}
    </div>
  );
}

// ── Chat screen
function ChatScreen({ user, theme, onBack, onNav }) {
  const t = theme;
  const { t: tr, lang } = useI18n();
  const [msgs, setMsgs] = React.useState(CHAT_THREADS[user.id] || []);
  const [draft, setDraft] = React.useState('');

  const send = () => {
    if (!draft.trim()) return;
    setMsgs(prev => [...prev, { from: 'me', text: draft, textRu: draft, time: 'now' }]);
    setDraft('');
  };

  return (
    <div style={{ background: t.bg, height: '100%', display: 'flex', flexDirection: 'column' }}>
      {/* Chat header */}
      <div style={{
        display: 'flex', alignItems: 'center', gap: 10, padding: '4px 14px 12px',
        borderBottom: `1px solid ${t.border}`, background: t.surface,
      }}>
        <IconBtn name="arrow-left" onClick={onBack}/>
        <div style={{ width: 36, height: 36, borderRadius: 18, overflow: 'hidden' }}>
          <PhotoSlot color={user.color} color2={user.color2} style={{ width: '100%', height: '100%' }}/>
        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: t.text }}>{user.name}</div>
          <div style={{ fontSize: 11, color: t.success, fontWeight: 600 }}>{tr('online')}</div>
        </div>
        <IconBtn name="dumbbell" color={t.p2} onClick={() => onNav('inviteWorkout', user)}/>
        <IconBtn name="more"/>
      </div>

      {/* Messages */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '14px 14px 8px', display: 'flex', flexDirection: 'column', gap: 8 }}>
        <div style={{
          textAlign: 'center', fontSize: 11, color: t.textDim, padding: '8px 0',
          fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.5,
        }}>
          {tr('matchedOn')} {lang === 'ru' ? 'сегодня' : 'today'} · {user.distance} {lang === 'ru' ? 'км' : 'km'}
        </div>
        {msgs.map((m, i) => {
          const mine = m.from === 'me';
          return (
            <div key={i} style={{
              display: 'flex', justifyContent: mine ? 'flex-end' : 'flex-start',
            }}>
              <div style={{
                maxWidth: '72%', padding: '10px 14px', borderRadius: 18,
                background: mine ? t.grad : t.surface,
                color: mine ? '#fff' : t.text,
                border: mine ? 'none' : `1px solid ${t.border}`,
                fontSize: 14, lineHeight: 1.4,
                borderBottomRightRadius: mine ? 4 : 18,
                borderBottomLeftRadius: mine ? 18 : 4,
              }}>
                {lang === 'ru' ? m.textRu : m.text}
                <div style={{ fontSize: 10, opacity: 0.7, marginTop: 4, textAlign: 'right' }}>{m.time}</div>
              </div>
            </div>
          );
        })}

        {/* Suggested action */}
        <div style={{
          margin: '8px 0', padding: 12, borderRadius: 14,
          background: t.gradSoft, border: `1px solid ${t.p2}44`,
          display: 'flex', alignItems: 'center', gap: 10,
        }}>
          <Icon name="dumbbell" size={20} color={t.p2}/>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: t.text }}>{tr('suggestWorkout')}</div>
            <div style={{ fontSize: 11, color: t.textMuted, marginTop: 2 }}>
              {lang === 'ru' ? 'Назначь совместную тренировку' : 'Schedule a workout together'}
            </div>
          </div>
          <button onClick={() => onNav('inviteWorkout', user)} style={{
            padding: '6px 12px', borderRadius: 10, border: 'none', background: t.p2,
            color: '#fff', fontWeight: 700, fontSize: 12, cursor: 'pointer', fontFamily: 'inherit',
          }}>{tr('add')}</button>
        </div>
      </div>

      {/* Input */}
      <div style={{ padding: '8px 14px 14px', background: t.surface, borderTop: `1px solid ${t.border}`, display: 'flex', alignItems: 'center', gap: 8 }}>
        <IconBtn name="image" bg={t.chip}/>
        <input
          value={draft}
          onChange={e => setDraft(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && send()}
          placeholder={tr('typeMessage')}
          style={{
            flex: 1, padding: '12px 16px', borderRadius: 22,
            border: `1px solid ${t.border}`, background: t.bg,
            color: t.text, fontSize: 14, fontFamily: 'inherit', outline: 'none',
          }}
        />
        <IconBtn name="send" bg={t.grad} color="#fff" onClick={send}/>
      </div>
    </div>
  );
}

          <div style={{ display: 'flex', gap: 6 }}>

              <Pill key={l} active={level === l} onClick={() => setLevel(l)} color={t.p2}>{l}</Pill>
            ))}
          </div>
        </div>

        {/* Schedule overlap */}
        <div>
          <div style={{ fontSize: 12, fontWeight: 700, color: t.textDim, letterSpacing: 0.5, textTransform: 'uppercase', marginBottom: 8, paddingLeft: 4 }}>

              <Pill key={i} active={i < 5} color={t.p2}>{d}</Pill>

        </div>

        <GradButton icon="check">{lang === 'ru' ? 'Применить фильтры' : 'Apply filters'}</GradButton>
      </div>
    </div>
  );
}

function CalendarScreen({ theme, onBack }) {

  return (

      <ScreenHeader
        title={tr('calendar')}
        left={<IconBtn name="arrow-left" onClick={onBack}/>}
        right={<IconBtn name="plus" bg={t.grad} color="#fff"/>}
        large theme={t}
      />

      {/* Month switcher */}
      <div style={{ padding: '0 18px 12px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div style={{ fontSize: 17, fontWeight: 700, color: t.text }}>{lang === 'ru' ? 'Май 2026' : 'May 2026'}</div>
        <div style={{ display: 'flex', gap: 6 }}>
          <IconBtn name="chevron-left" size={32} iconSize={16}/>
          <IconBtn name="chevron-right" size={32} iconSize={16}/>
        </div>
      </div>

      <div style={{ padding: '0 18px' }}>
        <Card padding={12}>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4, marginBottom: 6 }}>
            {days.map((d, i) => (
              <div key={i} style={{ textAlign: 'center', fontSize: 10, color: t.textDim, fontWeight: 700, padding: '4px 0' }}>{d}</div>
            ))}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4 }}>
            {Array.from({ length: 35 }).map((_, idx) => {
              const day = idx - 3; // Start offset
              if (day < 1 || day > 31) return <div key={idx} style={{ aspectRatio: '1' }}/>;
              const w = WORKOUT_HISTORY[day];
              const today = day === 24;
              return (
                <div key={idx} style={{
                  aspectRatio: '1', borderRadius: 8,
                  background: w ? t.gradSoft : 'transparent',
                  border: today ? `2px solid ${t.p2}` : `1px solid ${t.border}`,
                  display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                  position: 'relative', gap: 2,
                }}>
                  <span style={{ fontSize: 13, color: today ? t.p2 : (w ? t.text : t.textDim), fontWeight: today ? 800 : 600 }}>{day}</span>
                  {w && (
                    <div style={{ display: 'flex', gap: 2 }}>
                      {w.muscles.slice(0, 3).map((m, i) => (
                        <div key={i} style={{ width: 4, height: 4, borderRadius: 2, background: t.p2 }}/>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </Card>
      </div>

      {/* Upcoming workouts */}
      <SectionHeader title={lang === 'ru' ? 'Предстоящие' : 'Upcoming'} theme={t}/>
      <div style={{ padding: '0 18px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        {[
          { date: lang === 'ru' ? 'Сегодня · 18:00' : 'Today · 6 PM', name: lang === 'ru' ? 'Верх тела' : 'Upper body', color: t.p3 },
          { date: lang === 'ru' ? 'Завтра · 07:00' : 'Tomorrow · 7 AM', name: lang === 'ru' ? 'Ноги (с Alina)' : 'Legs (with Alina)', color: t.danger },
          { date: lang === 'ru' ? 'Чт · 19:00' : 'Thu · 7 PM', name: lang === 'ru' ? 'Тяги' : 'Pull day', color: t.p2 },
        ].map((w, i) => (
          <Card key={i} padding={14}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <div style={{ width: 6, height: 36, borderRadius: 3, background: w.color }}/>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: t.textMuted, fontWeight: 600 }}>{w.date}</div>
                <div style={{ fontSize: 15, fontWeight: 700, color: t.text, marginTop: 2 }}>{w.name}</div>
              </div>
              <IconBtn name="play" size={32} iconSize={14} bg={w.color} color="#fff"/>
            </div>
          </Card>
        ))}
      </div>
    </div>
  );
}

Object.assign(window, { ProfileScreen, SettingsScreen, EditProfileScreen, CalendarScreen, NutritionScreen, FriendsScreen, MedalsScreen, RanksScreen });

// ═══ app.jsx ═══
// app.jsx — App router + dual-frame canvas

// Global state — shared between iOS and Android frames
const AppCtx = React.createContext(null);

function AppProvider({ children }) {
  const [tab, setTab] = React.useState('discover'); // start on the headline feature
  const [stack, setStack] = React.useState([]); // route stack
  const [chatUser, setChatUser] = React.useState(null);

  const nav = React.useCallback((route, data) => {
    if (route === 'chat') {
      setChatUser(data);
      setStack(s => [...s, { route: 'chat', data }]);
    } else if (route === 'inviteWorkout') {
      setStack(s => [...s, { route: 'inviteWorkout', data }]);
    } else {
      setStack(s => [...s, { route, data }]);
    }
  }, []);

  const back = React.useCallback(() => setStack(s => s.slice(0, -1)), []);

  const value = { tab, setTab, stack, nav, back, chatUser };
  return <AppCtx.Provider value={value}>{children}</AppCtx.Provider>;
}

const useApp = () => React.useContext(AppCtx);

// ── Phone content (renders the current tab + stacked modals)
function PhoneContent({ mode, hideBottomNav }) {
  const theme = useTheme();
  const app = useApp();
  const current = app.stack[app.stack.length - 1];

  // Render bottom-most stack screen if there is one
  let content;
  if (current) {
    const { route, data } = current;
    switch (route) {
      case 'settings': content = <SettingsScreen theme={theme} onBack={app.back} onNav={app.nav}/>; break;
      case 'editProfile': content = <EditProfileScreen theme={theme} onBack={app.back}/>; break;
      case 'calendar': content = <CalendarScreen theme={theme} onBack={app.back}/>; break;
      case 'nutrition': content = <NutritionScreen theme={theme} onBack={app.back}/>; break;
      case 'medals': content = <MedalsScreen theme={theme} onBack={app.back}/>; break;
      case 'ranks': content = <RanksScreen theme={theme} onBack={app.back}/>; break;
      case 'stats': content = <RanksScreen theme={theme} onBack={app.back}/>; break;
      case 'matches': content = <MatchesScreen theme={theme} onBack={app.back} onNav={app.nav}/>; break;
      case 'chat': content = <ChatScreen user={data} theme={theme} onBack={app.back} onNav={app.nav}/>; break;
      case 'discoverFilters': content = <DiscoverFiltersScreen theme={theme} onBack={app.back}/>; break;
      case 'inviteWorkout': content = <InviteWorkoutScreen user={data} theme={theme} onBack={app.back}/>; break;
      case 'exercises': content = <ExercisesScreen theme={theme} onBack={app.back} onNav={app.nav}/>; break;
      case 'createExercise': content = <CreateExerciseScreen theme={theme} onBack={app.back}/>; break;
      case 'activeWorkout': content = <ActiveWorkoutScreen theme={theme} onBack={app.back}/>; break;
      default: content = null;
    }
  }

  if (!content) {
    switch (app.tab) {
      case 'home': content = <HomeScreen theme={theme} onNav={app.nav}/>; break;
      case 'workout': content = <WorkoutTrackerScreen theme={theme} onNav={app.nav}/>; break;
      case 'discover': content = <DiscoverScreen theme={theme} onNav={app.nav}/>; break;
      case 'friends': content = <FriendsScreen theme={theme}/>; break;
      case 'profile': content = <ProfileScreen theme={theme} onNav={app.nav}/>; break;
      default: content = <HomeScreen theme={theme} onNav={app.nav}/>;
    }
  }

  // Tabs that should hide bottom nav
  const inStack = app.stack.length > 0;
  const hide = hideBottomNav || inStack;

  return (
    <div style={{
      width: '100%', height: '100%', display: 'flex', flexDirection: 'column',
      background: theme.bg, color: theme.text, fontFamily: '-apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
      paddingTop: mode === 'ios' ? 54 : 32, // safe area for status bar
    }}>
      <div style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden', minHeight: 0 }}>
        {content}
      </div>
      {!hide && <BottomNav tab={app.tab} onTab={app.setTab} theme={theme} mode={mode}/>}
    </div>
  );
}

// ── Status bar overlay slot for phone shells
function PhoneShell({ kind, children, dark }) {
  // Place status bar manually; we want our own paddingTop
  const statusBarH = kind === 'ios' ? 50 : 36;
  return (
    <div style={{
      position: 'relative', width: '100%', height: '100%',
      paddingTop: statusBarH, paddingBottom: kind === 'ios' ? 34 : 18,
      boxSizing: 'border-box',
      display: 'flex', flexDirection: 'column',
    }}>
      {children}
    </div>
  );
}

// ── Top toolbar — theme/lang/tweaks
function Toolbar({ mode, setMode, lang, setLang, accent, setAccent }) {
  return (
    <div style={{
      position: 'fixed', top: 16, left: '50%', transform: 'translateX(-50%)',
      display: 'flex', alignItems: 'center', gap: 8, zIndex: 100,
      padding: '8px 12px', borderRadius: 999,
      background: mode === 'dark' ? 'rgba(20,26,43,0.85)' : 'rgba(255,255,255,0.9)',
      backdropFilter: 'blur(20px)',
      border: `1px solid ${mode === 'dark' ? '#262E47' : '#E4E8F0'}`,
      boxShadow: '0 8px 30px rgba(0,0,0,0.12)',
    }}>
      {/* Title */}
      <div style={{
        fontSize: 13, fontWeight: 800, padding: '4px 10px',
        background: ACCENT_PALETTES[accent].grad,
        WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
        fontFamily: '-apple-system, system-ui, sans-serif', letterSpacing: -0.3,
      }}>GymBuddy</div>

      <div style={{ width: 1, height: 18, background: mode === 'dark' ? '#39426A' : '#D2D8E3' }}/>

      {/* Theme toggle */}
      <button onClick={() => setMode(mode === 'dark' ? 'light' : 'dark')} style={{
        display: 'flex', alignItems: 'center', gap: 6,
        padding: '6px 10px', borderRadius: 999, border: 'none', cursor: 'pointer',
        background: 'transparent', color: mode === 'dark' ? '#fff' : '#0B1020',
        fontWeight: 600, fontSize: 12, fontFamily: 'inherit',
      }}>
        <Icon name={mode === 'dark' ? 'moon' : 'sun'} size={14}/>
        {mode === 'dark' ? 'Dark' : 'Light'}
      </button>

      {/* Lang toggle */}
      <button onClick={() => setLang(lang === 'ru' ? 'en' : 'ru')} style={{
        display: 'flex', alignItems: 'center', gap: 6,
        padding: '6px 10px', borderRadius: 999, border: 'none', cursor: 'pointer',
        background: 'transparent', color: mode === 'dark' ? '#fff' : '#0B1020',
        fontWeight: 600, fontSize: 12, fontFamily: 'inherit',
      }}>
        <Icon name="globe" size={14}/>
        {lang === 'ru' ? 'RU' : 'EN'}
      </button>
    </div>
  );
}

// ── Root component: dual frames side-by-side
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "mode": "dark",
  "accent": "aurora",
  "lang": "en"
}/*EDITMODE-END*/;

function Root() {
  const [tk, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const { mode, accent, lang } = tk;

  return (
    <ThemeProvider mode={mode} accent={accent}>
      <I18nProvider lang={lang}>
        <AppProvider>
          <div style={{
            minHeight: '100vh', width: '100%',
            background: mode === 'dark'
              ? 'radial-gradient(120% 80% at 50% -10%, #1a1f36 0%, #04060d 60%)'
              : 'linear-gradient(180deg, #F0F3FA 0%, #DCE3F0 100%)',
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            padding: '90px 24px 60px', gap: 30, boxSizing: 'border-box',
          }}>
            <Toolbar mode={mode} setMode={(v) => setTweak('mode', v)} lang={lang} setLang={(v) => setTweak('lang', v)} accent={accent} setAccent={(v) => setTweak('accent', v)}/>

            {/* Frames */}
            <div style={{ display: 'flex', gap: 50, alignItems: 'flex-start', flexWrap: 'wrap', justifyContent: 'center' }}>
              {/* iOS */}
              <div data-screen-label="iOS Frame" style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: mode === 'dark' ? '#A2ABC5' : '#5B6478', letterSpacing: 2, textTransform: 'uppercase' }}>iOS</div>
                <IOSDevice width={380} height={780} dark={mode === 'dark'}>
                  <PhoneContent mode="ios"/>
                </IOSDevice>
              </div>

              {/* Android */}
              <div data-screen-label="Android Frame" style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: mode === 'dark' ? '#A2ABC5' : '#5B6478', letterSpacing: 2, textTransform: 'uppercase' }}>Android</div>
                <AndroidDevice width={380} height={780} dark={mode === 'dark'}>
                  <PhoneContent mode="android"/>
                </AndroidDevice>
              </div>
            </div>

            <TweaksPanel title="Tweaks">
              <TweakSection label="Theme">
                <TweakRadio
                  label="Mode" value={mode}
                  onChange={(v) => setTweak('mode', v)}
                  options={[{value:'light',label:'Light'},{value:'dark',label:'Dark'}]}
                />
              </TweakSection>
              <TweakSection label="Accent">
                <TweakRadio
                  label="Palette" value={accent}
                  onChange={(v) => setTweak('accent', v)}
                  options={[
                    {value:'aurora',label:'Aurora'},
                    {value:'sunset',label:'Sunset'},
                    {value:'electric',label:'Neon'},
                  ]}
                />
              </TweakSection>
              <TweakSection label="Language">
                <TweakRadio
                  label="Lang" value={lang}
                  onChange={(v) => setTweak('lang', v)}
                  options={[{value:'en',label:'EN'},{value:'ru',label:'RU'}]}
                />
              </TweakSection>
            </TweaksPanel>
          </div>
        </AppProvider>
      </I18nProvider>
    </ThemeProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Root/>);

</script>
</body>
