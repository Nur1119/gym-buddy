name: Build iOS IPA (unsigned)

on:
  push:
    branches: [main, master]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ipa.yml'
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    defaults:
      run:
        working-directory: ios/GymBuddy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned .app for device
        id: build
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild \
            -project GymBuddy.xcodeproj \
            -scheme GymBuddy \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            build 2>&1 | tee build/xcodebuild.log

      - name: Report build errors on failure
        if: failure()
        run: |
          LOG=build/xcodebuild.log
          if [ ! -f "$LOG" ]; then
            echo "(no log file)" > /tmp/loglines.txt
          else
            grep -E "error:|FAILED|fatal|Undefined|cannot find|Error|^\*\*" "$LOG" | tail -n 300 > /tmp/loglines.txt || true
            if [ ! -s /tmp/loglines.txt ]; then tail -n 300 "$LOG" > /tmp/loglines.txt; fi
          fi
          # Print to step output so it's visible in the Actions log
          echo "::group::Xcode build errors"
          cat /tmp/loglines.txt
          echo "::endgroup::"
          # Also write to step summary
          {
            echo '### iOS build errors'
            echo '```'
            head -c 60000 /tmp/loglines.txt
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Package unsigned .ipa
        if: success()
        run: |
          APP_PATH=$(find build/DerivedData/Build/Products -type d -name "GymBuddy.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "GymBuddy.app not found" >&2
            find build/DerivedData/Build/Products -maxdepth 4 -type d
            exit 1
          fi
          echo "App at: $APP_PATH"
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -qry GymBuddy-unsigned.ipa Payload
          ls -lh GymBuddy-unsigned.ipa

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GymBuddy-unsigned-ipa
          path: ios/GymBuddy/build/GymBuddy-unsigned.ipa
          if-no-files-found: error

      - name: Upload full xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ios/GymBuddy/build/xcodebuild.log
          if-no-files-found: ignore

      - name: Create release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ios/GymBuddy/build/GymBuddy-unsigned.ipa
