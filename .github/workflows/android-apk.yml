name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'android/**'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties', 'android/gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        id: build
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace 2>&1 | tee /tmp/gradle.log

      - name: Post build log as commit comment on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          LOG=/tmp/gradle.log
          if [ ! -f "$LOG" ]; then
            echo "(no log file)" > /tmp/loglines.txt
          else
            grep -E "error:|FAILED|Unresolved|Exception|^e: |Cannot|fatal|^\* What went wrong" "$LOG" | tail -n 250 > /tmp/loglines.txt || true
            if [ ! -s /tmp/loglines.txt ]; then tail -n 300 "$LOG" > /tmp/loglines.txt; fi
            head -c 40000 /tmp/loglines.txt > /tmp/loglines.trim.txt
            mv /tmp/loglines.trim.txt /tmp/loglines.txt
          fi
          {
            echo '### Android build failure (filtered errors, truncated to 40KB)'
            echo
            echo '```'
            cat /tmp/loglines.txt
            echo '```'
          } > /tmp/comment.md
          jq -Rs '{body: .}' < /tmp/comment.md > /tmp/payload.json
          gh api -X POST "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" --input /tmp/payload.json || {
            echo "Comment post failed. Payload size: $(wc -c </tmp/payload.json)"
            head -c 2000 /tmp/payload.json
            exit 1
          }

      - name: Upload full gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-log
          path: /tmp/gradle.log
          if-no-files-found: ignore

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GymBuddy-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Create release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/*.apk
